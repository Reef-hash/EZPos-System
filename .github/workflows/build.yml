name: Build EZPos WinForms

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '6.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --configuration Release --no-restore

    - name: Publish
      run: dotnet publish --configuration Release --output ./publish

    - name: Download Inno Setup
      run: |
        Invoke-WebRequest -Uri "https://jrsoftware.org/download.php/is.exe" -OutFile "is.exe"
        Start-Process -Wait -FilePath .\is.exe /VERYSILENT /SUPPRESSMSGBOXES /NORESTART /SP- /DIR="C:\innosetup"

    - name: Add Inno Setup to PATH
      run: echo "C:\innosetup" | Out-File -Append -FilePath $env:GITHUB_PATH

    - name: Build Inno Setup installer
      run: |
        "C:\innosetup\ISCC.exe" InnoSetup-EZPos.iss

    - name: Upload installer to Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ github.run_number }}
        name: Release v${{ github.run_number }}
        files: SetupEZPos.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
